name: Build

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  pull_request:
    branches: [master]

jobs:
  go-build:
    name: Go build & tidy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/server

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/server/go.sum

      - name: go mod tidy
        run: go mod tidy

      - name: Commit go.sum if changed
        # Only commit back on branch pushes, not tags (tags are immutable)
        if: github.ref_type == 'branch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --exit-code go.sum go.mod || (
            git add go.sum go.mod &&
            git commit -m "chore: go mod tidy [skip ci]" &&
            git push
          )

      - name: go build
        run: CGO_ENABLED=0 go build -v ./...

      - name: go vet
        run: go vet ./...

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: go-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cadence image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/cadence.Dockerfile
          push: false
          tags: cadence:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
