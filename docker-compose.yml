# Cadence docker-compose — Portainer-ready
#
# Images are pre-built locally by install.sh (docker build).
# Copy this file into Portainer as a Stack — no source checkout needed.
#
# Profiles:
#   (none)    — cadence + icecast + liquidsoap + SQLite
#   postgres  — adds postgres, set CSERVER_DB_BACKEND=postgres in cadence.env
#   redis     — adds redis for rate limiting
#
# Required env vars (set in Portainer Stack → Environment variables):
#   HOST_MUSIC_DIR   — absolute path on Docker host, e.g. /srv/data/music

services:

  icecast2:
    image: cadence_icecast2:latest
    container_name: icecast2
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /srv/ssd/HOMELAB/cadence/config/icecast.xml:/etc/icecast/cadence.xml:ro
    networks:
      - services-net
      - stream-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/status-json.xsl"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  liquidsoap:
    image: cadence_liquidsoap:latest
    container_name: liquidsoap
    restart: unless-stopped
    volumes:
      - /srv/ssd/HOMELAB/cadence/config/liquidsoap.liq:/etc/liquidsoap/cadence.liq:ro
      - ${HOST_MUSIC_DIR}:/music:ro
    depends_on:
      icecast2:
        condition: service_healthy
    expose:
      - "1234"
      - "8001"
    networks:
      - services-net
      - stream-net

  cadence:
    image: cadence:latest
    container_name: cadence
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - /srv/ssd/HOMELAB/cadence/config/cadence.env
    volumes:
      - ${HOST_MUSIC_DIR}:/music:ro
      - /srv/ssd/HOMELAB/cadence/custom.css:/app/public/css/custom.css:ro
      - /srv/data/hdd_01/HOMELAB/cadence/data:/data
    depends_on:
      icecast2:
        condition: service_healthy
      liquidsoap:
        condition: service_started
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    container_name: cadence-postgres
    restart: unless-stopped
    expose:
      - "5432"
    env_file:
      - /srv/ssd/HOMELAB/cadence/config/cadence.env
    volumes:
      - /srv/data/hdd_01/HOMELAB/cadence/postgres:/var/lib/postgresql/data
    networks:
      - services-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cadence}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    container_name: cadence-redis
    restart: unless-stopped
    command: >
      sh -c '
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --requirepass "$${REDIS_PASSWORD}" --save "" --appendonly no
        else
          exec redis-server --save "" --appendonly no
        fi'
    expose:
      - "6379"
    networks:
      - services-net
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          if [ -n "${REDIS_PASSWORD:-}" ]; then
            redis-cli -a "${REDIS_PASSWORD}" ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  services-net:
    external: true
  stream-net:
    driver: bridge
