# Cadence docker-compose
#
# Profiles:
#   (none)    — cadence + icecast + liquidsoap + SQLite  [recommended for homelab]
#   postgres  — adds postgres service, set CSERVER_DB_BACKEND=postgres in cadence.env
#   redis     — adds redis service for rate limiting
#
# Quick start (SQLite):
#   docker compose up -d
#
# Full stack:
#   docker compose --profile postgres --profile redis up -d

services:

  icecast2:
    build:
      context: .
      dockerfile: ./src/icecast2.Dockerfile
    image: cadence_icecast2
    container_name: icecast2
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config/icecast.xml:/etc/icecast/cadence.xml:ro
    networks:
      - services-net
      - stream-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/status-json.xsl"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  liquidsoap:
    build:
      context: .
      dockerfile: ./src/liquidsoap.Dockerfile
    image: cadence_liquidsoap
    container_name: liquidsoap
    restart: unless-stopped
    volumes:
      - ./config/liquidsoap.liq:/etc/liquidsoap/cadence.liq:ro
      - ${MUSIC_DIR:-/music}:${MUSIC_DIR:-/music}:ro
    depends_on:
      icecast2:
        condition: service_healthy
    expose:
      - "1234"
      - "8001"
    networks:
      - services-net
      - stream-net

  cadence:
    build:
      context: ./src/
      dockerfile: ./cadence.Dockerfile
    image: cadence
    container_name: cadence
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./config/cadence.env
    volumes:
      - ${MUSIC_DIR:-/music}:${MUSIC_DIR:-/music}:ro
      - ./src/server/public/css/custom.css:/app/public/css/custom.css:ro
      - ./data:/data
    depends_on:
      icecast2:
        condition: service_healthy
      liquidsoap:
        condition: service_started
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    container_name: cadence-postgres
    restart: unless-stopped
    expose:
      - "5432"
    env_file:
      - ./config/cadence.env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - services-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    container_name: cadence-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --save ""
      --appendonly no
    expose:
      - "6379"
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  services-net:
    driver: bridge
  stream-net:
    driver: bridge
