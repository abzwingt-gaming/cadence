# Cadence docker-compose — Portainer-ready
#
# Images are pre-built locally by install.sh.
# No build: blocks — copy this file into Portainer as a Stack.
#
# Profiles:
#   (none)    — cadence + icecast + liquidsoap + SQLite
#   postgres  — adds postgres service
#   redis     — adds redis for rate limiting
#
# Required in Portainer Stack → Environment variables:
#   HOST_MUSIC_DIR      absolute path on Docker host, e.g. /srv/data/music
#
# Recommended to override in Portainer:
#   POSTGRES_PASSWORD   change from default before first deploy
#   CSERVER_ADMIN_TOKEN set a strong random string to enable /api/admin/*

services:

  icecast2:
    image: cadence_icecast2:latest
    container_name: icecast2
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /srv/ssd/HOMELAB/cadence/config/icecast.xml:/etc/icecast/cadence.xml:ro
    networks:
      - services-net
      - stream-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/status-json.xsl"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  liquidsoap:
    image: cadence_liquidsoap:latest
    container_name: liquidsoap
    restart: unless-stopped
    volumes:
      - /srv/ssd/HOMELAB/cadence/config/liquidsoap.liq:/etc/liquidsoap/cadence.liq:ro
      - ${HOST_MUSIC_DIR}:/music:ro
    depends_on:
      icecast2:
        condition: service_healthy
    expose:
      - "1234"
      - "8001"
    networks:
      - services-net
      - stream-net

  cadence:
    image: cadence:latest
    container_name: cadence
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ── General ────────────────────────────────────────────────────────────
      CSERVER_PORT: "8080"
      CSERVER_ROOTPATH: /app/public/
      CSERVER_MUSIC_DIR: /music
      CSERVER_LOGLEVEL: info           # debug | info | warn | error
      CSERVER_DEVMODE: "false"
      CSERVER_HISTORY_SIZE: "10"
      # ── Admin auth ─────────────────────────────────────────────────────────
      # Set to a strong random string to enable /api/admin/rescan.
      # Leave empty to disable admin endpoints entirely.
      CSERVER_ADMIN_TOKEN: ""
      # ── Scan ───────────────────────────────────────────────────────────────
      CSERVER_SCAN_WORKERS: "4"
      CSERVER_FSNOTIFY_DEBOUNCE_MS: "3000"
      # ── DB retry ───────────────────────────────────────────────────────────
      CSERVER_DB_RETRIES: "5"
      CSERVER_DB_RETRY_DELAY_MS: "3000"
      # ── Icecast ────────────────────────────────────────────────────────────
      CSERVER_ICECAST_STATUS_URL: http://icecast2:8000
      CSERVER_ICECAST_POLL_INTERVAL_MS: "1000"
      # Set to your Caddy URL if proxying the stream externally:
      CSERVER_PUBLIC_STREAM_URL: ""    # e.g. https://radio.lan.zedzulmeng.online
      # ── Liquidsoap ─────────────────────────────────────────────────────────
      CSERVER_LIQUIDSOAPADDRESS: liquidsoap
      CSERVER_LIQUIDSOAPPORT: "1234"
      CSERVER_LIQUIDSOAP_HTTP_PORT: "8001"
      CSERVER_LIQUIDSOAP_MODE: auto
      CSERVER_LIQUIDSOAP_TIMEOUT_MS: "5000"
      # ── Rate limiting ──────────────────────────────────────────────────────
      # Keep false when behind Caddy — use Caddy rate_limit instead.
      # Set true + add redis profile only for direct/dev access.
      CSERVER_RATELIMIT_ENABLED: "false"
      CSERVER_REAL_IP_HEADER: X-Forwarded-For
      # MUST be set when CSERVER_REAL_IP_HEADER is set, or header is ignored.
      CSERVER_TRUSTED_PROXY: ""        # e.g. 172.20.0.0/16 (Caddy container CIDR)
      CSERVER_REQRATELIMIT: "5"
      CSERVER_ART_RATELIMIT_MAX: "16"
      CSERVER_ART_RATELIMIT_WINDOW_MS: "200000"
      # ── Database ───────────────────────────────────────────────────────────
      CSERVER_DB_BACKEND: sqlite        # sqlite | postgres
      CSERVER_SQLITE_PATH: /data/cadence.db
      # ── Postgres (only used when CSERVER_DB_BACKEND=postgres) ─────────────
      CSERVER_POSTGRESADDRESS: cadence-postgres
      CSERVER_POSTGRESPORT: "5432"
      CSERVER_POSTGRESUSER: postgres
      POSTGRES_PASSWORD: changeme
      CSERVER_POSTGRESDBNAME: cadence
      CSERVER_POSTGRESTABLENAME: metadata
      CSERVER_POSTGRESSSL: disable
      # ── Redis (only used when CSERVER_RATELIMIT_ENABLED=true) ─────────────
      CSERVER_REDISADDRESS: cadence-redis
      CSERVER_REDISPORT: "6379"
      CSERVER_REDISPASSWORD: ""
      CSERVER_REDISDB: "0"
      # ── Advanced / optional ────────────────────────────────────────────────
      # CSERVER_WHITELIST_PATH: ""       # path to song whitelist file
      # CSERVER_PATTERN_SEPARATOR: ";;"  # separator for cleanup pattern lists
      # CSERVER_TITLE_CLEANUP_PATTERNS: "" # override default title cleanup regex
      # CSERVER_ARTIST_CLEANUP_PATTERNS: "" # override default artist cleanup regex
      # CSERVER_VERSION: ""              # override reported version string
    volumes:
      - ${HOST_MUSIC_DIR}:/music:ro
      - /srv/ssd/HOMELAB/cadence/custom.css:/app/public/css/custom.css:ro
      - /srv/data/hdd_01/HOMELAB/cadence/data:/data
    depends_on:
      icecast2:
        condition: service_healthy
      liquidsoap:
        condition: service_started
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    container_name: cadence-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: cadence
    volumes:
      - /srv/data/hdd_01/HOMELAB/cadence/postgres:/var/lib/postgresql/data
    networks:
      - services-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cadence"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    container_name: cadence-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    expose:
      - "6379"
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  services-net:
    external: true
  stream-net:
    driver: bridge
